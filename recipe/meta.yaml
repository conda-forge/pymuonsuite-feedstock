{% set name = "pymuonsuite" %}
{% set version = "0.4.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a86aad9606dbc001d2ff0dcfbd38a35cec6dbb4b38f362be3520944536b366d7

build:
  number: 0
  noarch: python
  entry_points:
    - pm-muairss-gen = pymuonsuite.muairss:main_generate
    - pm-muairss = pymuonsuite.muairss:main
    - pm-uep-opt = pymuonsuite.calculate.uep.__main__:geomopt_entry
    - pm-uep-plot = pymuonsuite.calculate.uep.__main__:plot_entry
    - pm-nq = pymuonsuite.quantum.__main__:nq_entry
    - pm-asephonons = pymuonsuite.quantum.__main__:asephonons_entry
    - pm-symmetry = pymuonsuite.symmetry:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - ase >=3.18.1
    - numpy
    - parse-fmt >=0.5
    - python >={{ python_min }},<3.12a0
    - pyyaml
    - schema
    - scipy
    - soprano >=0.8.11
    - spglib >0.8

test:
  imports:
    - pymuonsuite
    - pymuonsuite.calculate
  commands:
    - pip check
    - pm-muairss-gen --help
    - pm-muairss --help
    - pm-uep-opt --help
    - pm-uep-plot --help
    - pm-nq --help
    - pm-asephonons --help
    - pm-symmetry --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/PyMuonSuite/
  summary: A suite of utilities for muon spectroscopy
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - joelvdavies
    - leandro-liborio
    - patrick-austin
